name: Crowdin Sync

# Replaces the opaque Crowdin GitHub *App* integration with the Crowdin GitHub
# *Action*, so localization sync runs inside our own CI where it is visible,
# pinned, and debuggable.
#
#   - On push to main that touches en-US.json (the only source file), we push
#     the updated source strings up to Crowdin. A Crowdin project Automation
#     ("Pre-translate via MT/AI" on source update) then translates them async.
#   - On a daily schedule (and on-demand via "Run workflow"), we pull completed
#     translations down and open a PR onto main, which Crowdin Auto-merge lands.
#     So adding a source string flows to translated locales hands-free within a
#     day, no manual step.
#
# Config (file mapping, project id) lives in crowdin.yaml at the repo root.
# Secret: CROWDIN_PERSONAL_TOKEN (already set in repo secrets).

"on":
  push:
    branches:
      - main
    paths:
      - frontend/src/messages/en-US.json
      - crowdin.yaml
  schedule:
    # Daily 06:00 UTC — pull whatever translations are ready and open a PR.
    # Daily (vs. weekly) so a merged source-string change reaches translated
    # locales within a day once the Crowdin pre-translate Automation has run.
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Manual trigger. Use this for the first sync after enabling the Action.
    inputs:
      download:
        description: "Download translations and open a PR (in addition to uploading sources)"
        type: boolean
        default: true

# Least privilege: read by default; write is scoped to the jobs that need it.
permissions:
  contents: read

# Never let two syncs race each other against the same Crowdin project.
concurrency:
  group: crowdin-sync
  cancel-in-progress: false

jobs:
  crowdin:
    name: Crowdin Sync
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the l10n/crowdin branch
      pull-requests: write    # open the translation PR
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      # Push only: a source string changed on main. Don't open a PR here —
      # there may be no new translations yet.
      - name: Upload sources to Crowdin
        if: github.event_name == 'push'
        uses: crowdin/github-action@52aa776766211d83d975df51f3b9c53c2f8ba35f # v2.16.3
        with:
          config: crowdin.yaml
          upload_sources: true
          upload_translations: false
          download_translations: false
        env:
          CROWDIN_PROJECT_ID: "854226"
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      # Pull translations and open a PR onto main. Runs on the weekly schedule
      # and on manual dispatch. The Action recreates the l10n/crowdin branch
      # fresh from main each run, so it cannot drift the way the old App branch did.
      - name: Download translations and open PR
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.download)
        uses: crowdin/github-action@52aa776766211d83d975df51f3b9c53c2f8ba35f # v2.16.3
        with:
          config: crowdin.yaml
          upload_sources: true
          upload_translations: false
          download_translations: true
          localization_branch_name: l10n/crowdin
          create_pull_request: true
          pull_request_base_branch_name: main
          pull_request_title: "chore(i18n): sync translations from Crowdin"
          pull_request_body: "Automated translation sync from Crowdin. Source strings (en-US.json) are never modified here."
          pull_request_labels: "i18n,automated"
          commit_message: "chore(i18n): sync translations from Crowdin"
        env:
          CROWDIN_PROJECT_ID: "854226"
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          # Required for the Action to push l10n/crowdin and open the PR.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Make unattended failures loud. A scheduled/push sync that fails silently is
  # exactly how the old integration rotted for 5 months. Manual (workflow_dispatch)
  # runs are skipped here since whoever triggered them already sees the result.
  notify-failure:
    name: Report sync failure
    needs: crowdin
    if: failure() && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update a tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create crowdin-sync-failure --color B60205 \
            --description "Crowdin Sync workflow failed" --force --repo "$GITHUB_REPOSITORY" || true
          body=$(printf 'The scheduled `Crowdin Sync` workflow failed — translations are not syncing.\n\nFailed run: %s\n\nSee docs/i18n-workflow.md. This issue gets a new comment on each subsequent failure; close it once a run succeeds.' "$RUN_URL")
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --label crowdin-sync-failure --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "Crowdin Sync workflow failed" \
              --label crowdin-sync-failure --body "$body"
          fi
